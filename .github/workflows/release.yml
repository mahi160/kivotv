name: Release APK

# Runs on every version tag (v1.0.0, v1.2.3-beta, …).
# Push a tag to trigger:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Java 17 (required by AGP 8+) ────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter (stable, version from pubspec constraints) ───────────────
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Restore pub cache ────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── Write keystore + properties from secrets ─────────────────────────
      # Required secrets (set in repo Settings → Secrets → Actions):
      #   KEYSTORE_BASE64    – base64-encoded .jks file
      #                        (run: base64 -w 0 kivo-release.jks)
      #   KEYSTORE_PASSWORD  – storePassword
      #   KEY_ALIAS          – keyAlias
      #   KEY_PASSWORD       – keyPassword
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/kivo-release.jks

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=kivo-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # ── Build split APKs ─────────────────────────────────────────────────
      # Produces one APK per ABI (~30 MB each vs ~90 MB fat APK).
      # Outputs land in build/app/outputs/flutter-apk/.
      - name: Build release APKs
        run: flutter build apk --release --split-per-abi

      # ── Rename with version tag ──────────────────────────────────────────
      - name: Rename APKs
        run: |
          TAG="${{ github.ref_name }}"
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            mv "$f" "kivo-${TAG}-${f#app-}"
          done
          ls -lh *.apk

      # ── Create GitHub Release and upload APKs ────────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kivo TV ${{ github.ref_name }}"
          body: |
            ## Kivo TV ${{ github.ref_name }}

            ### Install
            Download the APK for your device's CPU architecture:
            | File | Architecture |
            |------|-------------|
            | `*arm64-v8a*` | Modern Android TV boxes (most common) |
            | `*armeabi-v7a*` | Older 32-bit boxes |
            | `*x86_64*` | Emulator / Intel-based devices |

            Sideload via ADB:
            ```
            adb install kivo-${{ github.ref_name }}-arm64-v8a-release.apk
            ```
          files: build/app/outputs/flutter-apk/kivo-*.apk
          fail_on_unmatched_files: true
